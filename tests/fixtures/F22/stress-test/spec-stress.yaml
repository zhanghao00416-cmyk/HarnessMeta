artifact:
  id: ORD-specs
  type: spec
  title: 电商订单系统规格
  domain: order
  status: reviewed
  version: 1.0.0
overview: 大型电商订单系统，支持下单、支付、物流、退款、评价等完整订单生命周期。日订单量 100 万+。
requirements:
- id: REQ-ORD-001
  title: 订单创建
  description: 用户可以通过前端页面创建新订单，选择商品和数量
  priority: could
  category: functional
  scenarios:
  - id: SC-REQ-ORD-001-01
    given: 前置条件 1-A
    when: 触发动作 1-A
    then: 预期结果 1-A
    acceptance_criteria:
    - 验收标准 1-A1：响应时间 < 500ms
    - 验收标准 1-A2：错误率 < 0.1%
  - id: SC-REQ-ORD-001-02
    given: 前置条件 1-B
    when: 触发动作 1-B
    then: 预期结果 1-B
    acceptance_criteria:
    - 验收标准 1-B1：并发 1000 TPS
    - 验收标准 1-B2：数据一致性保证
