artifact:
  id: order-architecture
  type: architecture
  title: 电商订单系统架构规格
  domain: order
  status: reviewed
  version: 1.0.0
overview: 订单系统采用微服务架构，包含订单服务、支付服务、库存服务、物流服务。服务间通过消息队列异步通信。
constraints:
- id: CON-ORD-001
  type: architecture
  title: 分层约束
  rule: Service 层不得直接访问数据库，必须通过 Repository 接口
  severity: info
  verification: code_review
- id: CON-ORD-002
  type: architecture
  title: 依赖方向
  rule: 上层可以依赖下层，下层不得依赖上层
  severity: info
  verification: code_review
- id: CON-ORD-003
  type: security
  title: 认证约束
  rule: 所有 API 端点必须通过 JWT Token 认证
  severity: block
  verification: code_review
- id: CON-ORD-004
  type: security
  title: 授权约束
  rule: 非管理员用户不得访问管理接口
  severity: info
  verification: automated_test
- id: CON-ORD-005
  type: data
  title: 数据一致性
  rule: 订单状态变更必须在事务中完成
  severity: block
  verification: code_review
- id: CON-ORD-006
  type: data
  title: 数据隔离
  rule: 多租户数据必须通过 tenant_id 隔离
  severity: block
  verification: code_review
- id: CON-ORD-007
  type: reliability
  title: 消息可靠性
  rule: 订单事件必须持久化到消息队列后才能确认
  severity: warning
  verification: code_review
- id: CON-ORD-008
  type: reliability
  title: 幂等约束
  rule: 支付回调接口必须支持幂等处理
  severity: info
  verification: code_review
- id: CON-ORD-009
  type: performance
  title: 响应时间
  rule: 订单查询接口 P95 响应时间 < 200ms
  severity: warning
  verification: automated_test
- id: CON-ORD-010
  type: performance
  title: 并发约束
  rule: 下单接口支持 5000 TPS 并发
  severity: warning
  verification: code_review
- id: CON-ORD-011
  type: compliance
  title: 日志约束
  rule: 所有订单操作必须记录审计日志
  severity: info
  verification: code_review
- id: CON-ORD-012
  type: compliance
  title: 数据保留
  rule: 订单数据必须保留至少 5 年
  severity: info
  verification: automated_test
- id: CON-ORD-013
  type: testing
  title: 测试覆盖
  rule: Service 层单元测试覆盖率 > 80%
  severity: info
  verification: static_analysis
- id: CON-ORD-014
  type: testing
  title: 集成测试
  rule: 支付流程必须通过集成测试
  severity: block
  verification: static_analysis
- id: CON-ORD-015
  type: architecture
  title: 接口约束
  rule: 所有 Service 方法必须有类型注解
  severity: warning
  verification: code_review
- id: CON-ORD-016
  type: security
  title: 输入校验
  rule: 所有用户输入必须经过 Pydantic 校验
  severity: block
  verification: code_review
- id: CON-ORD-017
  type: data
  title: 索引约束
  rule: order_id 和 user_id 必须建立联合索引
  severity: info
  verification: static_analysis
- id: CON-ORD-018
  type: reliability
  title: 超时约束
  rule: 外部服务调用超时时间 < 5 秒
  severity: warning
  verification: static_analysis
- id: CON-ORD-019
  type: performance
  title: 缓存约束
  rule: 热点商品信息必须缓存，过期时间 10 分钟
  severity: warning
  verification: static_analysis
- id: CON-ORD-020
  type: compliance
  title: 隐私约束
  rule: 用户手机号在日志中必须脱敏
  severity: info
  verification: code_review
- id: CON-ORD-021
  type: architecture
  title: 分层约束（扩展2）
