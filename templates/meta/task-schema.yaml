# Task Schema

> **版本**：v1.0-frozen
> **状态**：Frozen（2026-06-24 冻结）
> **冻结依据**：Phase 2 Artifact Chain Review v2.0 通过（总分 9.25/10，复审修复了 constraint_refs + acceptance_criteria_ids）
> **依赖**：Artifact Meta Schema v1.0-frozen、Spec Schema v1.0-frozen
> **职责**：定义任务/工单（How）—— 描述怎么实现，不描述业务需求
>
> 设计目标：
> - **需求映射（Requirement Mapping）**：每个 Task 明确追踪到 Spec 的需求
> - **可执行（Executable）**：Task 能被 harness-execute 直接执行
> - **可验证（Verifiable）**：Task 有明确的完成标准和验证步骤
>
> ⚠️ **Frozen Schema**：本文件已冻结。任何修改必须遵循 Schema Change Policy（见 schema-change-policy.md），
> 不得直接修改字段语义、删除字段或修改必填规则。

---

## 设计原则

1. **每个 Task 映射到至少一个需求**
   - `requirement_refs` 是一级字段，不可为空
   - 确保实现的可追踪性

2. **只描述 How，不重复 What**
   - ✅ 正确："创建 NotificationService 类，实现 send() 方法"
   - ❌ 错误："用户可以通过邮件接收通知"（这是 Spec 的职责）

3. **Task 粒度适中**
   - 一个 Task 应该能在 1-4 小时内完成
   - 过大的 Task 应该拆分为多个子 Task

4. **与 Spec Schema 边界清晰**
   - Task 引用 Spec 的需求，不重新定义需求
   - Task 包含实现步骤，Spec 不包含

---

## Schema 定义

```yaml
task:
  # === 继承自 Artifact Meta ===
  # artifact.id, artifact.type, artifact.title, artifact.domain,
  # artifact.status, artifact.version, artifact.source,
  # artifact.dependencies, artifact.related_artifacts
  # 见 artifact-meta-schema.yaml

  # === 需求映射（核心字段） ===
  requirement_refs:
    description: "本 Task 实现的需求引用列表"
    type: array
    required: true
    items:
      type: object
      properties:
        requirement_id:
          description: "需求 ID（来自 Spec Schema）"
          type: string
          format: "REQ-{domain}-{seq:03d}"
          required: true
          example: "REQ-NOT-001"

        coverage:
          description: "本 Task 对该需求的覆盖程度"
          type: string
          enum: [full, partial, prerequisite]
          required: true
          default: full
          example: "full"
          notes: |
            full: 本 Task 完全实现该需求
            partial: 本 Task 只实现该需求的一部分
            prerequisite: 本 Task 是实现该需求的前置条件（如基础设施搭建）

        scenario_ids:
          description: "覆盖的场景 ID 列表（可选）"
          type: array
          items:
            type: string
          required: false
          example: ["SC-REQ-NOT-001-01", "SC-REQ-NOT-001-02"]

    validation:
      description: "requirement_refs 必须非空"
      rule: "len(requirement_refs) > 0"
      error: "每个 Task 必须至少映射到一个需求"

  # === 目标描述 ===
  objective:
    description: "Task 目标（一句话，描述本 Task 要做什么）"
    type: string
    required: true
    example: "实现通知发送核心服务，支持邮件渠道"

  # === 实现步骤 ===
  implementation_steps:
    description: "实现步骤列表"
    type: array
    required: true
    items:
      type: object
      properties:
        id:
          description: "步骤唯一标识"
          type: string
          format: "STEP-{task_id}-{seq:03d}"
          required: true
          example: "STEP-F22-001-001"

        title:
          description: "步骤标题"
          type: string
          required: true
          example: "创建 NotificationService 类"

        description:
          description: "步骤详细描述"
          type: string
          required: true
          example: |
            在 services/notification 目录下创建 NotificationService 类，
            实现 send() 方法，接收通知事件并调用对应渠道发送器。

        type:
          description: "步骤类型"
          type: string
          enum: [code, config, test, doc, migration, infra, review]
          required: true
          default: code
          example: "code"

        estimated_effort:
          description: "预估工作量"
          type: string
          enum: [xs, s, m, l, xl]
          required: false
          default: m
          example: "m"
          notes: |
            xs: < 15 分钟
            s: 15-30 分钟
            m: 30-60 分钟
            l: 1-2 小时
            xl: 2-4 小时

        requirement_refs:
          description: "本步骤关联的需求 ID（可选，用于细粒度追踪）"
          type: array
          items:
            type: string
          required: false
          example: ["REQ-NOT-001"]

        dependencies:
          description: "本步骤依赖的其他步骤 ID"
          type: array
          items:
            type: string
          required: false
          example: ["STEP-F22-001-001"]

  # === 验证步骤 ===
  validation_steps:
    description: "验证步骤列表（如何证明 Task 已完成）"
    type: array
    required: true
    items:
      type: object
      properties:
        id:
          description: "验证步骤唯一标识"
          type: string
          format: "VAL-{task_id}-{seq:03d}"
          required: true
          example: "VAL-F22-001-001"

        title:
          description: "验证标题"
          type: string
          required: true
          example: "运行通知发送单元测试"

        description:
          description: "验证详细描述"
          type: string
          required: true
          example: "执行 pytest tests/services/test_notification.py，确保所有测试通过"

        type:
          description: "验证类型"
          type: string
          enum: [automated_test, manual_test, code_review, integration_test, performance_test, security_scan]
          required: true
          example: "automated_test"

        command:
          description: "验证命令（如适用）"
          type: string
          required: false
          example: "pytest tests/services/test_notification.py -v"

        expected_result:
          description: "预期结果"
          type: string
          required: true
          example: "所有测试通过，覆盖率 > 80%"

        acceptance_criteria_ids:
          description: "本验证覆盖的验收标准 ID（来自 Spec Schema）"
          type: array
          items:
            type: string
            format: "AC-{domain}-{seq:03d}"
          required: false
          example: ["AC-NOT-001", "AC-NOT-002"]

        requirement_refs:
          description: "本验证关联的需求 ID"
          type: array
          items:
            type: string
          required: false
          example: ["REQ-NOT-001"]

  # === 完成定义 ===
  definition_of_done:
    description: "完成定义（必须全部满足才能标记 Task 为 passing）"
    type: object
    required: true
    properties:
      criteria:
        description: "完成标准列表"
        type: array
        required: true
        items:
          type: object
          properties:
            id:
              description: "标准唯一标识"
              type: string
              format: "DOD-{task_id}-{seq:03d}"
              required: true
              example: "DOD-F22-001-001"

            description:
              description: "标准描述"
              type: string
              required: true
              example: "所有实现步骤已完成"

            checked:
              description: "是否已检查"
              type: boolean
              required: true
              default: false
              example: false

      mandatory_reviews:
        description: "必须通过的评审"
        type: array
        required: false
        items:
          type: object
          properties:
            type:
              description: "评审类型"
              type: string
              enum: [self_review, peer_review, architecture_review, security_review]
              required: true
              example: "self_review"

            status:
              description: "评审状态"
              type: string
              enum: [pending, passed, failed]
              required: true
              default: pending
              example: "pending"

      artifact_updates:
        description: "必须更新的产物"
        type: array
        required: false
        items:
          type: object
          properties:
            artifact_id:
              description: "产物 ID"
              type: string
              required: true
              example: "api-contract-v2"

            update_type:
              description: "更新类型"
              type: string
              enum: [create, update, verify]
              required: true
              example: "update"

            status:
              description: "更新状态"
              type: string
              enum: [pending, done]
              required: true
              default: pending
              example: "pending"

  # === 约束与依赖 ===
  constraints:
    description: "本 Task 的约束条件"
    type: object
    required: false
    properties:
      constraint_refs:
        description: "必须遵循的架构约束 ID（来自 Architecture Schema）"
        type: array
        items:
          type: string
          format: "CON-{domain}-{seq:03d}"
        required: false
        example: ["CON-NOT-001", "CON-NOT-002"]

      code_standards:
        description: "必须遵循的代码规范"
        type: array
        items:
          type: string
        required: false
        example: ["遵循项目命名规范", "类型注解覆盖率 100%"]

      must_read_docs:
        description: "执行前必须阅读的文档"
        type: array
        items:
          type: string
        required: false
        example: ["ARCHITECTURE.md", "API_CONTRACT.md"]

      code_dependencies:
        description: "代码依赖（执行前必须读取的文件）"
        type: array
        items:
          type: string
        required: false
        example: ["src/services/base.py", "src/models/notification.py"]

  # === 风险与假设 ===
  risks:
    description: "已知风险"
    type: array
    required: false
    items:
      type: object
      properties:
        id:
          description: "风险唯一标识"
          type: string
          format: "RISK-{task_id}-{seq:03d}"
          required: true
          example: "RISK-F22-001-001"

        description:
          description: "风险描述"
          type: string
          required: true
          example: "SMTP 服务配置可能延迟"

        mitigation:
          description: "缓解措施"
          type: string
          required: false
          example: "使用本地 MailHog 进行开发测试"

        impact:
          description: "影响程度"
          type: string
          enum: [low, medium, high]
          required: false
          default: medium
          example: "medium"

  # === 执行指令 ===
  execution_command:
    description: "给 Agent 的执行指令（复制给代码工具）"
    type: string
    required: false
    example: |
      按 AGENTS.md 启动；执行工单 F22-order-001，严格阶段 1→2→3。
      阶段 1：读 DEPENDENCY_MAP F22-order-001 行 + 上文 docs + 前序代码
      阶段 2：仅实现 implementation_steps 清单
      阶段 3：自审 + 更新 feature_list / progress / session-handoff
```

