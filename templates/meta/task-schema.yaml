## 与现有模板的映射

| 现有模板 | 当前结构 | 映射到 Task Schema |
|----------|----------|-------------------|
| `orders/order.md` | `## 元数据` | `artifact.*` |
| `orders/order.md` | `## 功能三元组` | `task.objective` + `task.requirement_refs` |
| `orders/order.md` | `## 验收标准` | `task.definition_of_done.criteria` |
| `orders/order.md` | `### 1.1 前序代码依赖` | `task.constraints.code_dependencies` |
| `orders/order.md` | `### 1.2 必读 docs` | `task.constraints.must_read_docs` |
| `orders/order.md` | `### 2.2 实现清单` | `task.implementation_steps` |
| `orders/order.md` | `### 3.1 自审` | `task.validation_steps` + `task.definition_of_done` |
| `orders/order.md` | `## 执行指令` | `task.execution_command` |
| `changes/tasks.md` | `## 1. {分组}` | `task.implementation_steps` |
| `changes/tasks.md` | `- [ ] 1.1 {任务}` | `task.implementation_steps[].title` |

