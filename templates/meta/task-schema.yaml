## 与上游 Spec 的关系

```
Spec Schema（What）
  ├── REQ-NOT-001: 用户可以通过邮件接收通知
  │     └── SC-REQ-NOT-001-01: 用户配置邮件渠道后接收通知
  │           └── acceptance_criteria[]
  │
  └── traceability.downstream[]
        └── task: F22-order-001  ←── Task Schema 填充

Task Schema（How）
  ├── requirement_refs[]
  │     ├── requirement_id: REQ-NOT-001
  │     │     └── coverage: full
  │     │     └── scenario_ids: [SC-REQ-NOT-001-01]
  │     └── requirement_id: REQ-NOT-002
  │           └── coverage: partial
  │
  ├── implementation_steps[]
  │     └── requirement_refs: [REQ-NOT-001]  ←── 反向追踪
  │
  ├── validation_steps[]
  │     └── requirement_refs: [REQ-NOT-001]  ←── 验证覆盖
  │
  └── definition_of_done
```

---

## 验证清单

- [ ] `requirement_refs` 非空，每个 Task 至少映射到一个需求
- [ ] `requirement_refs[].coverage` 正确标注（full/partial/prerequisite）
- [ ] `implementation_steps` 非空
- [ ] `validation_steps` 非空
- [ ] `definition_of_done.criteria` 非空
- [ ] 不重复定义需求（引用 Spec 的需求 ID，不重新定义需求内容）
- [ ] 实现步骤粒度适中（1-4 小时）
- [ ] 验证步骤关联到需求（验证覆盖追踪）

