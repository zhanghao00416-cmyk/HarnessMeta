## 与现有模板的映射

| 现有模板 | 对应 Artifact Type | 当前变量 | 映射到 Meta 字段 |
|----------|-------------------|----------|-----------------|
| `specs/spec.md` | `spec` | `{{domain}}` | `artifact.domain` |
| `specs/spec.md` | `spec` | `{{name}}` | `artifact.title` |
| `changes/proposal.md` | `proposal` | `{{change_name}}` | `artifact.id` |
| `changes/delta-spec.md` | `spec` | `{{domain}}` | `artifact.domain` |
| `changes/tasks.md` | `task` | `{{change_name}}` | `artifact.id` |
| `changes/design.md` | `design` | `{{change_name}}` | `artifact.id` |
| `orders/order.md` | `task` | `{{id}}` | `artifact.id` |
| `orders/order.md` | `task` | `{{title}}` | `artifact.title` |
| `architecture/*.md` | `architecture` | `{{project_name}}` | `context.project.name` |

