## 使用规则

### 规则 1：所有 Artifact 必须包含 Meta 层

```markdown
---
artifact:
  id: F22-specs
  type: spec
  title: F22 通知推送系统规格
  domain: notification
  status: reviewed
  version: "1.0.0"
  source:
    skill: harness-specify
    feature_id: F22
    created: "2026-06-24T15:30:00+08:00"
    updated: "2026-06-24T15:30:00+08:00"
  dependencies: ["F22-proposal"]
  related_artifacts: ["api-contract-v2"]
---

# F22 通知推送系统规格

## 需求
...
```

### 规则 2：ID 命名规范

| 类型 | 格式 | 示例 |
|------|------|------|
| spec | `{feature_id}-specs` | `F22-specs` |
| task | `{feature_id}-order-{seq}` | `F22-order-001` |
| design | `{feature_id}-design` | `F22-design` |
| architecture | `{domain}-{artifact-type}` | `notification-domain-map` |
| proposal | `{feature_id}-proposal` | `F22-proposal` |
| report | `{feature_id}-report-{type}` | `F22-validation-report` |

### 规则 3：状态流转

```
draft → reviewed → active → passing → archived
   ↓        ↓         ↓
deprecated deprecated deprecated
```

- `draft`：Skill 刚生成，尚未评审
- `reviewed`：通过 harness-verify 或人工评审
- `active`：task 正在被实现
- `passing`：task 通过验证
- `deprecated`：被新版本替代
- `archived`：不再活跃，但保留历史

### 规则 4：依赖图约束

- Artifact 的 `dependencies` 必须构成 DAG，禁止循环依赖
- Skill 读取 Artifact 时，必须确保其 `dependencies` 已存在
- `related_artifacts` 不强制存在，仅用于导航

### 规则 5：与 Context Contract 的关系

```
Context Contract（项目环境）
    ↓ 提供
artifact.source.feature_id → context.feature.id
artifact.domain → context.feature.domain
    ↓
Artifact Meta（产物身份）
    ↓ 扩展
Spec Schema / Task Schema / Architecture Schema（产物内容）
```

- **Context Contract** 描述"项目是什么"
- **Artifact Meta** 描述"产物是谁"
- **Type Schema** 描述"产物包含什么"

