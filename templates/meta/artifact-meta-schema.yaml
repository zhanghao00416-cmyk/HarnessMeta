## 验证清单

- [ ] 所有产物文件包含 YAML Front Matter 中的 `artifact` 块
- [ ] `artifact.id` 全局唯一
- [ ] `artifact.type` 在枚举范围内
- [ ] `artifact.dependencies` 无循环依赖
- [ ] `artifact.source.skill` 在枚举范围内
- [ ] `artifact.status` 流转符合状态机

## 引用完整性校验规则

所有 Artifact 类型必须遵守以下引用校验规则：

### 规则 6：ID 引用必须存在

| 引用方 | 被引用方 | 引用字段 | 校验规则 |
|--------|----------|----------|----------|
| Task | Spec | `requirement_refs[].requirement_id` | 必须匹配 `Spec.requirements[].id` |
| Task | Spec | `requirement_refs[].scenario_ids[]` | 必须匹配 `Spec.requirements[].scenarios[].id` |
| Task | Spec | `validation_steps[].acceptance_criteria_ids[]` | 必须匹配 `Spec.acceptance_criteria[].id` |
| Task | Architecture | `constraints.constraint_refs[]` | 必须匹配 `Architecture.constraints[].id` |
| Architecture | Spec | `constraints[].related_requirements[]` | 必须匹配 `Spec.requirements[].id` |
| Architecture | Architecture | `constraints[].related_modules[]` | 必须匹配 `Architecture.modules[].id` |
| Architecture | Architecture | `modules[].dependencies[]` | 必须匹配 `Architecture.modules[].id` |
| Architecture | Architecture | `interfaces[].source` / `target` | 必须匹配 `Architecture.modules[].id` |
| All | All | `artifact.dependencies[]` | 必须匹配已存在的 `artifact.id` |
| All | All | `artifact.related_artifacts[]` | 必须匹配已存在的 `artifact.id` |

### 规则 7：ID 格式校验

| ID 类型 | 格式 | 示例 |
|---------|------|------|
| Requirement | `REQ-{domain}-{seq:03d}` | REQ-NOT-001 |
| Scenario | `SC-{req_id}-{seq:02d}` | SC-REQ-NOT-001-01 |
| Acceptance Criteria | `AC-{domain}-{seq:03d}` | AC-NOT-001 |
| Business Rule | `BR-{domain}-{seq:03d}` | BR-NOT-001 |
| User Flow | `UF-{domain}-{seq:03d}` | UF-NOT-001 |
| API Change | `API-{domain}-{seq:03d}` | API-NOT-001 |
| Data Change | `DATA-{domain}-{seq:03d}` | DATA-NOT-001 |
| Task | `{feature_id}-order-{seq:03d}` | F22-order-001 |
| Step | `STEP-{task_id}-{seq:03d}` | STEP-F22-001-001 |
| Validation | `VAL-{task_id}-{seq:03d}` | VAL-F22-001-001 |
| DoD | `DOD-{task_id}-{seq:03d}` | DOD-F22-001-001 |
| Risk | `RISK-{task_id}-{seq:03d}` | RISK-F22-001-001 |
| Module | `MOD-{domain}-{seq:03d}` | MOD-NOT-001 |
| Interface | `IF-{domain}-{seq:03d}` | IF-NOT-001 |
| Data Model | `DM-{domain}-{seq:03d}` | DM-NOT-001 |
| Constraint | `CON-{domain}-{seq:03d}` | CON-NOT-001 |
| ADR | `ADR-{seq:03d}` | ADR-001 |

### 规则 8：引用校验执行时机

- **生成时**：Skill 生成 Artifact 时，必须验证所有自引用 ID 的格式正确性
- **评审时**：harness-verify 必须验证所有跨 Artifact 引用的目标存在性
- **执行时**：harness-execute 必须验证 Task 引用的 Architecture 约束是否被遵守

