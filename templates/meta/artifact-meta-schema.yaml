# Artifact Meta Schema

> **版本**：v1.0-frozen
> **状态**：Frozen（2026-06-24 冻结）
> **冻结依据**：Phase 2 Artifact Chain Review v2.0 通过（总分 9.25/10）
> **依赖**：Context Contract v1（已冻结）
>
> 所有 Artifact（规格、工单、设计文档、架构文档等）必须包含此 Meta 层。
> 它提供统一的身份标识、状态追踪和关联机制，确保不同 Skill 的产物可以自动关联。
>
> ⚠️ **Frozen Schema**：本文件已冻结。任何修改必须遵循 Schema Change Policy（见 schema-change-policy.md），
> 不得直接修改字段语义、删除字段或修改必填规则。

---

## 设计原则

1. **统一身份**：所有 Artifact 共享同一套 ID 和类型系统
2. **状态单一来源**：每个 Artifact 的状态在此定义，禁止在多处维护
3. **关联可追溯**：通过 `dependencies` 和 `related_artifacts` 建立 DAG
4. **与 Context Contract 解耦**：Meta 描述 Artifact 本身，Context 描述项目环境

---

## Schema 定义

```yaml
artifact:
  # === 身份标识 ===
  id:
    description: "Artifact 唯一标识"
    type: string
    format: "kebab-case"
    required: true
    examples:
      - "F22-notification-system"      # 功能规格
      - "F22-order-001"               # 工单
      - "F22-design"                  # 技术设计
      - "notification-domain-map"     # 架构文档
      - "api-contract-v2"            # API 契约

  type:
    description: "Artifact 类型"
    type: string
    enum:
      - spec           # 规格文档（主规格 / 增量规格）
      - task           # 工单
      - design         # 技术设计文档
      - architecture   # 架构文档（API契约、数据模型、域映射等）
      - proposal       # 变更提案
      - report         # 报告（验证报告、评审报告等）
      - meta           # 元文档（AGENTS.md、ARCHITECTURE.md 等）
    required: true

  # === 描述信息 ===
  title:
    description: "Artifact 标题（人类可读）"
    type: string
    required: true
    example: "F22 通知推送系统规格"

  domain:
    description: "所属业务域"
    type: string
    required: false
    source: "context.feature.domain"
    example: "notification"

  # === 状态管理 ===
  status:
    description: "Artifact 生命周期状态"
    type: string
    enum:
      - draft        # 草稿，尚未评审
      - reviewed     # 已评审，待实现
      - active       # 正在实现中（仅 task 类型）
      - passing      # 已通过验证（仅 task 类型）
      - deprecated   # 已废弃，被新版本替代
      - archived     # 已归档，不再活跃
    required: true
    default: draft

  version:
    description: "Artifact 版本"
    type: string
    format: "semver"
    required: true
    default: "1.0.0"
    example: "1.0.0"

  # === 来源追踪 ===
  source:
    description: "Artifact 的来源信息"
    type: object
    required: true
    properties:
      skill:
        description: "生成此 Artifact 的 Skill"
        type: string
        enum:
          - harness-init
          - harness-init-docs
          - harness-clarify
          - harness-specify
          - harness-specify-arch
          - harness-order
          - harness-change
          - harness-analyze
          - harness-execute
          - harness-verify
          - harness-project-memory
          - manual         # 人工创建
        example: "harness-specify"

      feature_id:
        description: "关联的功能 ID（如 F22）"
        type: string
        required: false
        source: "context.feature.id"
        example: "F22"

      created:
        description: "创建时间（ISO 8601）"
        type: string
        format: "date-time"
        example: "2026-06-24T15:30:00+08:00"

      updated:
        description: "最后更新时间（ISO 8601）"
        type: string
        format: "date-time"
        example: "2026-06-24T16:00:00+08:00"

  # === 关联关系 ===
  dependencies:
    description: "此 Artifact 依赖的其他 Artifact ID 列表"
    type: array
    items:
      type: string
    required: false
    default: []
    examples:
      - ["F22-proposal"]           # specs 依赖 proposal
      - ["F22-specs", "F22-design"] # task 依赖 specs 和 design

  related_artifacts:
    description: "相关但不构成依赖的 Artifact ID 列表"
    type: array
    items:
      type: string
    required: false
    default: []
    examples:
      - ["api-contract-v2"]       # specs 关联 API 契约
      - ["notification-domain-map"] # task 关联域映射

  # === 扩展字段 ===
  # 各类型 Artifact 在 Meta 层之上扩展自己的 Schema
  # 例如 spec 扩展 requirements、acceptance_criteria 等
  # 例如 task 扩展 objective、implementation_steps 等
```

