## 示例：完整 Artifact

### 规格文档（Spec）

```markdown
---
artifact:
  id: F22-specs
  type: spec
  title: F22 通知推送系统规格
  domain: notification
  status: reviewed
  version: "1.0.0"
  source:
    skill: harness-specify
    feature_id: F22
    created: "2026-06-24T15:30:00+08:00"
    updated: "2026-06-24T15:30:00+08:00"
  dependencies: ["F22-proposal"]
  related_artifacts: ["api-contract-v2", "notification-domain-map"]
---

# F22 通知推送系统规格

## 概述
...

## 需求
...
```

### 工单（Task）

```markdown
---
artifact:
  id: F22-order-001
  type: task
  title: F22 通知推送系统 — 核心服务实现
  domain: notification
  status: not_started
  version: "1.0.0"
  source:
    skill: harness-order
    feature_id: F22
    created: "2026-06-24T16:00:00+08:00"
    updated: "2026-06-24T16:00:00+08:00"
  dependencies: ["F22-specs"]
  related_artifacts: ["F22-design", "api-contract-v2"]
---

# 工单 F22-order-001

## 功能三元组
...
```

