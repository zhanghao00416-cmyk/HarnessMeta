# 通知推送系统架构规格

## 概述

通知推送系统采用分层架构，包含 API 层、Service 层、Domain 层和 Infrastructure 层。
所有通知通过统一的事件队列分发，支持多渠道并行发送。

## 模块

### MOD-NOT-001：notification

**职责**：负责通知事件的接收、路由和发送
**层**：service

**接口**：
- NotificationService.send()
  - 协议：internal_api
  - 描述：接收通知事件并触发发送流程

**依赖**：MOD-NOT-002, MOD-INF-001

**约束**：
- 不得直接调用外部 HTTP API

### MOD-NOT-002：channel-sender

**职责**：负责具体渠道（邮件、短信）的发送实现
**层**：infrastructure

## 接口

### IF-NOT-001：notification → channel-sender

**协议**：message_queue
**描述**：通知事件通过消息队列分发到发送器
**约束**：
- 消息必须包含 trace_id
- 失败消息必须进入死信队列

## 数据模型引用

### DM-NOT-001：NotificationRecord

**类型**：entity
**职责**：存储通知发送历史和状态
**所属模块**：MOD-NOT-001
**关联需求**：REQ-NOT-001

## 部署影响

### 新增服务

| 服务 | 类型 | 描述 |
|------|------|------|
| notification-worker | worker | 通知发送工作进程 |

### 配置变更

| 配置键 | 说明 | 必填 |
|--------|------|------|
| SMTP_HOST | SMTP 服务器地址 | 是 |

### 基础设施变更

| 资源 | 变更 |
|------|------|
| queue | 新增通知事件队列 |

## 约束

### CON-NOT-001：分层访问约束

**类型**：architecture
**规则**：Service 层不得直接访问数据库，必须通过 Repository 接口
**违反后果**：block
**验证方法**：code_review
**关联模块**：MOD-NOT-001
**关联需求**：REQ-NOT-001

### CON-NOT-002：消息可靠性约束

**类型**：reliability
**规则**：所有通知事件必须持久化到数据库后才能确认消费
**违反后果**：block
**验证方法**：code_review
**关联模块**：MOD-NOT-001
**关联需求**：REQ-NOT-001

## 架构决策

### ADR-001：使用消息队列处理通知事件

**状态**：accepted
**背景**：通知系统需要支持高并发发送，同步处理会阻塞主流程
**决策**：使用 Redis Stream 作为消息队列，异步处理通知事件
**后果**：增加系统复杂度，但提升吞吐量和可靠性
**关联需求**：REQ-NOT-001

## 追踪矩阵

**关联需求**：
- REQ-NOT-001
- REQ-NOT-002

**受影响任务**：
- F22-order-001
- F22-order-002

**上游**：
- spec: F22-specs

**下游**：（待 harness-order/harness-execute 填充）
```

