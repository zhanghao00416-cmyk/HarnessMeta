## 与下游消费方的关系

```
Architecture Schema（Constraints）
  ├── constraints[]
  │     ├── CON-NOT-001: Service 层不得直接访问数据库
  │     │     └── verification: code_review
  │     │     └── related_requirements: [REQ-NOT-001]
  │     │
  │     └── CON-NOT-002: 消息必须持久化后确认
  │           └── verification: code_review
  │           └── related_requirements: [REQ-NOT-001]
  │
  └── traceability.task_ids[]
        └── F22-order-001  ←── Task 执行时读取约束

Task Schema（How）
  ├── constraints.architecture_rules[]
  │     └── "Service 层不得直接访问数据库"  ←── 引用 Architecture 约束
  │
  └── validation_steps[]
        └── 验证 Architecture 约束是否被遵守

Verify Schema（验证）
  ├── 读取 Architecture.constraints
  ├── 读取 Task.implementation_steps
  └── 验证：实现是否遵守约束？
```

---

## 验证清单

- [ ] 每个约束有唯一 ID（CON-{domain}-{seq}）
- [ ] 每个约束有可验证的规则（避免模糊表述）
- [ ] 每个约束有验证方法（code_review / static_analysis / runtime_check / manual_review）
- [ ] 每个约束有违反后果（block / warning / info）
- [ ] 不重复定义需求（引用 Spec 的需求 ID）
- [ ] 不定义实现步骤（只定义约束规则）
- [ ] 数据模型只引用，不定义字段细节
- [ ] traceability.requirement_ids 非空
- [ ] 模块依赖构成 DAG，无循环依赖

