## 与现有模板的映射

| 现有模板 | 当前结构 | 映射到 Spec Schema |
|----------|----------|-------------------|
| `specs/spec.md` | `## 用途` | `spec.overview` |
| `specs/spec.md` | `## 需求` | `spec.requirements` |
| `specs/spec.md` | `### 需求：{name}` | `spec.requirements[].title` |
| `specs/spec.md` | `#### 场景：{scenario}` | `spec.requirements[].scenarios[]` |
| `specs/spec.md` | `前置 / 当 / 则` | `scenario.given / when / then` |
| `changes/delta-spec.md` | `## 新增需求` | `spec.requirements[]` (新增) |
| `changes/delta-spec.md` | `## 修改需求` | `spec.requirements[]` (更新) |
| `changes/delta-spec.md` | `## 移除需求` | `spec.requirements[]` (标记移除) |
| `changes/delta-spec.md` | `## 重命名需求` | `spec.requirements[]` (更新 id) |

