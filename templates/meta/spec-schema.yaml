## 与下游 Schema 的关系

```
Spec Schema（What）
  ├── requirements[]
  │     ├── id: REQ-NOT-001
  │     └── scenarios[]
  │           └── acceptance_criteria[]
  │
  └── traceability.downstream[] ←── Task Schema 填充
          ├── task: F22-order-001
          ├── task: F22-order-002
          └── test_case: TC-NOT-001

Task Schema（How）
  ├── objective: "实现 REQ-NOT-001"
  └── implementation_steps[]
        └── references: REQ-NOT-001
```

---

## 验证清单

- [ ] 每个需求有唯一 ID（REQ-{domain}-{seq}）
- [ ] 每个需求有至少一个场景
- [ ] 每个场景有 Given-When-Then 结构
- [ ] 每个场景有验收标准（可验证的 checklist）
- [ ] 不包含实现细节（文件路径、代码结构、技术选型）
- [ ] API 变更只声明业务语义，不包含端点定义
- [ ] 数据变更只声明业务语义，不包含字段类型
- [ ] traceability.requirement_ids 包含所有需求 ID
- [ ] 需求优先级使用 must/should/could/wont

