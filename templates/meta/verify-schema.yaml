## 与四层 Frozen Schema 的关系

```
Spec Schema v1.0-frozen
    ↓ 提供 requirements[]/scenarios[]/acceptance_criteria[]
Task Schema v1.0-frozen
    ↓ 提供 requirement_refs[]/validation_steps[].acceptance_criteria_ids/constraints.constraint_refs[]
Architecture Schema v1.0-frozen
    ↓ 提供 constraints[]/related_requirements[]/related_modules[]
    ↓
Verify Schema v0.1-draft（本文件）
    ├── 读取 Spec.requirements → 计算 Requirement Coverage
    ├── 读取 Task.validation_steps.acceptance_criteria_ids → 计算 Acceptance Coverage
    ├── 读取 Architecture.constraints + Task.constraints.constraint_refs → 计算 Constraint Coverage
    ├── 读取 Task.validation_steps.status → 计算 Validation Coverage
    └── 生成 Verify Report
```

**结论**：Verify Schema 完全建立在已冻结的四层 Schema 之上，不需要修改任何 Frozen Schema。

