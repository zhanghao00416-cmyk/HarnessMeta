## 与现有 Skill 的映射

| Verify Schema 组件 | 现有 Skill | 现有 Skill 输出 | 升级方向 |
|--------------------|-----------|-----------------|----------|
| `verify-coverage` | harness-verify | 验证报告 | 改用 Verify Schema 输出 |
| `verify-acceptance` | harness-verify | 验证报告 | 改用 Verify Schema 输出 |
| `verify-constraint` | harness-review-loop | 代码审查报告 | 增加 constraint_coverage |
| `verify-dod` | harness-runtime-verify | 运行时报告 | 改用 Verify Schema 输出 |
| `coverage.*` | harness-analyze | 审计报告 | 复用四层覆盖率计算 |

### 升级路径

**Phase 2.5.1**：设计 Verify Schema（本文件）✅

**Phase 2.5.2**：升级 harness-verify 输出 Verify Schema 格式

**Phase 2.5.3**：升级 harness-runtime-verify 输出 Verify Schema 格式

**Phase 2.5.4**：升级 harness-review-loop 增加 constraint_coverage

**Phase 2.5.5**：升级 harness-analyze 复用覆盖率计算

**Phase 2.5.6**：Verify Schema v1.0 冻结

