# Verify Schema

> **版本**：v1.0-frozen
> **状态**：✅ **Phase 2.5 Frozen（2026-06-24）**
> **依赖**：Context Contract v1.0-frozen、Artifact Meta Schema v1.0-frozen、Spec Schema v1.0-frozen、Task Schema v1.0-frozen、Architecture Schema v1.0-frozen
> **职责**：链路最终消费者——验证 Spec/Task/Architecture 的完整性和一致性，生成 Verify Report
> **受 Schema Change Policy 保护**：任何修改需走 PATCH/MINOR/MAJOR 流程

> 设计目标：
> - **闭环验证（Closed-loop Verification）**：Requirement → AC → Task → Constraint → Validation → Verify Report 形成完整闭环
> - **覆盖率计算（Coverage Calculation）**：自动计算 Requirement/Acceptance/Constraint/Validation 四种覆盖率
> - **失败可追溯（Failure Traceability）**：每个失败项可反向追踪到根因
> - **多轮迭代（Multi-iteration）**：支持 Verify → Fix → Re-verify 循环

> ⚠️ **Frozen Schema**：本文件自 2026-06-24 起进入 Frozen 状态，受 Schema Change Policy v1.0 保护。

> **变更历史**：
> - v1.0-frozen（2026-06-24）：Phase 2.5.9 Freeze
>   - 4 项字段命名冻结（coverage 四类、validation_status 四值、verify_output_mode 三值、severity_distribution 三值）
>   - 引入分维度词汇表策略（架构约束 / 运行时 / 问题严重度各自词汇表）
>   - Consumer Review 通过（4/4 一致）
>   - 详细冻结决策见 `templates/meta/phase2.5-freeze-declaration.md`
> - v0.2-draft（2026-06-24）：修复 V6 status 字段引用问题（Chain Review v2.5 发现），改为维护 `context.validation_status_map`，澄清 V2 伪代码
> - v0.1-draft（2026-06-24）：初始设计

---

## 设计原则

1. **只读消费**：Verify Schema 不修改 Spec/Task/Architecture，只读取和验证
2. **可生成性**：每个 Verify Report 必须可由 Schema 自动生成，不依赖人工判断
3. **多维度**：从需求、验收、约束、完成定义四个维度评估
4. **可重入**：Verify 必须支持多轮迭代（第一轮失败 → 修复 → 第二轮验证）
5. **修复路径**：每个失败项必须提供具体修复路径（指向具体 Skill 或文件）

---

## Verify 类型总览

Verify Schema 定义 4 种 Verify 类型：

| 类型 | 来源 | 消费者 | 输出 |
|------|------|--------|------|
| `verify-coverage` | Spec/Task 引用关系 | harness-verify | CoverageReport |
| `verify-acceptance` | Task.validation_steps vs Spec.acceptance_criteria | harness-verify | AcceptanceReport |
| `verify-constraint` | Task.constraint_refs vs Architecture.constraints | harness-review-loop | ConstraintReport |
| `verify-dod` | Task.definition_of_done vs actual execution | harness-runtime-verify | DoDReport |

---

## Schema 定义

```yaml
verify_report:
  # === 继承自 Artifact Meta ===
  # artifact.id, artifact.type, artifact.title, artifact.domain,
  # artifact.status, artifact.version, artifact.source,
  # artifact.dependencies, artifact.related_artifacts
  # 见 artifact-meta-schema.yaml

  # === 报告基本信息 ===
  target:
    description: "本次验证的目标 Feature / Task / Spec 标识"
    type: object
    required: true
    properties:
      feature_id:
        description: "关联的功能 ID"
        type: string
        example: "F22"

      task_ids:
        description: "本次验证覆盖的 Task ID 列表"
        type: array
        items:
          type: string
        example: ["F22-order-001", "F22-order-002"]

      spec_id:
        description: "关联的 Spec Artifact ID"
        type: string
        example: "F22-specs"

      architecture_id:
        description: "关联的 Architecture Artifact ID（可选）"
        type: string
        required: false
        example: "notification-architecture"

  iteration:
    description: "验证轮次（第几轮迭代）"
    type: integer
    required: true
    default: 1
    minimum: 1
    example: 1
    notes: |
      第一轮：初次验证
      第二轮：修复后重新验证
      第 N 轮：持续迭代直到全部通过

  # === 验证结果汇总 ===
  summary:
    description: "整体验证结果汇总"
    type: object
    required: true
    properties:
      total_checks:
        description: "总检查项数"
        type: integer
        required: true
        example: 25

      passed:
        description: "通过项数"
        type: integer
        required: true
        example: 22

      failed:
        description: "失败项数"
        type: integer
        required: true
        example: 2

      warned:
        description: "警告项数"
        type: integer
        required: true
        example: 1

      overall_status:
        description: "整体验证状态"
        type: string
        enum: [passing, failing, warning]
        required: true
        example: "warning"
        notes: |
          passing: 全部通过
          warning: 有警告但无失败
          failing: 有失败项

  # === 覆盖度报告 ===
  coverage:
    description: "四项覆盖度计算结果"
    type: object
    required: true
    properties:
      requirement_coverage:
        description: "需求覆盖率：被 Task 引用的需求占比"
        type: object
        required: true
        properties:
          total_requirements:
            description: "Spec 定义的总需求数"
            type: integer
            example: 5

          covered_requirements:
            description: "被至少一个 Task 引用的需求数"
            type: integer
            example: 5

          coverage_rate:
            description: "覆盖率（0-1）"
            type: number
            minimum: 0
            maximum: 1
            example: 1.0

          uncovered:
            description: "未覆盖的需求 ID 列表"
            type: array
            items:
              type: string
            example: []

      acceptance_coverage:
        description: "验收标准覆盖率：被 Validation 步骤覆盖的 AC 占比"
        type: object
        required: true
        properties:
          total_criteria:
            description: "Spec 定义的总验收标准数"
            type: integer
            example: 12

          covered_criteria:
            description: "被 validation_steps.acceptance_criteria_ids 覆盖的 AC 数"
            type: integer
            example: 10

          coverage_rate:
            description: "覆盖率（0-1）"
            type: number
            minimum: 0
            maximum: 1
            example: 0.833

          uncovered:
            description: "未覆盖的 AC ID 列表"
            type: array
            items:
              type: string
            example: ["AC-NOT-005", "AC-NOT-012"]

      constraint_coverage:
        description: "架构约束覆盖率：被 Task 引用的约束占比"
        type: object
        required: true
        properties:
          total_constraints:
            description: "Architecture 定义的总约束数"
            type: integer
            example: 3

          referenced_constraints:
            description: "被 constraint_refs 引用的约束数"
            type: integer
            example: 3

          coverage_rate:
            description: "覆盖率（0-1）"
            type: number
            minimum: 0
            maximum: 1
            example: 1.0

          unreferenced:
            description: "未被引用的约束 ID 列表"
            type: array
            items:
              type: string
            example: []

      validation_coverage:
        description: "验证步骤执行率：已通过的 Validation 步骤占比"
        type: object
        required: true
        properties:
          total_validations:
            description: "Task 定义的总验证步骤数"
            type: integer
            example: 8

          passed_validations:
            description: "已通过的验证步骤数"
            type: integer
            example: 8

          coverage_rate:
            description: "覆盖率（0-1）"
            type: number
            minimum: 0
            maximum: 1
            example: 1.0

  # === 详细检查项 ===
  checks:
    description: "逐项检查结果列表"
    type: array
    required: true
    items:
      type: object
      properties:
        check_id:
          description: "检查项唯一标识"
          type: string
          format: "VRF-{verify_id}-{seq:03d}"
          required: true
          example: "VRF-F22-VERIFY-001-001"

        type:
          description: "检查类型"
          type: string
          enum: [
            requirement_covered,        # 需求是否被 Task 覆盖
            acceptance_covered,         # AC 是否被 Validation 覆盖
            constraint_referenced,      # 约束是否被 Task 引用
            validation_passed,          # 验证步骤是否通过
            dod_satisfied,             # 完成定义是否满足
            reference_valid            # 引用 ID 是否有效
          ]
          required: true
          example: "requirement_covered"

        target_id:
          description: "被检查对象的 ID（如 REQ-NOT-001）"
          type: string
          required: true
          example: "REQ-NOT-001"

        status:
          description: "检查状态"
          type: string
          enum: [pass, fail, warn, skip]
          required: true
          example: "pass"

        message:
          description: "检查结果说明"
          type: string
          required: true
          example: "需求 REQ-NOT-001 被 F22-order-001 引用，覆盖率 full"

        evidence:
          description: "证据（引用的 Artifact ID + 字段路径）"
          type: object
          required: false
          properties:
            artifact_id:
              type: string
              example: "F22-order-001"

            field_path:
              type: string
              example: "requirement_refs[0].requirement_id"

            snippet:
              type: string
              example: "REQ-NOT-001 (coverage: full)"

        fix_path:
          description: "修复路径（仅 fail/warn 项）"
          type: string
          required: false
          example: |
            在 F22-order-001 的 requirement_refs 中增加 REQ-NOT-002，或创建新 Task F22-order-003 引用 REQ-NOT-002

        severity:
          description: "失败严重程度（仅 fail 项）"
          type: string
          enum: [block, warning, info]
          required: false
          example: "block"

  # === 失败项分析 ===
  failures:
    description: "失败项聚合（按失败原因分组）"
    type: array
    required: false
    items:
      type: object
      properties:
        failure_id:
          description: "失败项 ID"
          type: string
          format: "FAIL-{verify_id}-{seq:03d}"
          required: true
          example: "FAIL-F22-VERIFY-001"

        category:
          description: "失败类别"
          type: string
          enum: [
            missing_task,           # 需求没有对应 Task
            missing_validation,     # AC 没有对应 Validation
            missing_constraint_ref, # 约束没有被引用
            broken_reference,       # 引用了不存在的 ID
            validation_failed,      # 验证步骤执行失败
            dod_unsatisfied         # 完成定义未满足
          ]
          required: true
          example: "missing_task"

        affected_ids:
          description: "受影响的 ID 列表"
          type: array
          items:
            type: string
          required: true
          example: ["REQ-NOT-002"]

        impact:
          description: "影响范围"
          type: string
          required: true
          example: "1 个需求未被实现，影响功能 F22 核心邮件发送能力"

        recommended_fix:
          description: "建议修复方案"
          type: string
          required: true
          example: |
            使用 harness-order 为 REQ-NOT-002 生成新工单 F22-order-003，
            或更新现有工单 F22-order-001 的 requirement_refs 增加 REQ-NOT-002

        blocking:
          description: "是否阻塞"
          type: boolean
          required: true
          example: true

  # === 修复建议 ===
  recommendations:
    description: "整体修复建议（汇总）"
    type: array
    required: false
    items:
      type: object
      properties:
        priority:
          description: "优先级"
          type: string
          enum: [P0, P1, P2, P3]
          required: true
          example: "P0"

        action:
          description: "建议执行的动作"
          type: string
          required: true
          example: "运行 harness-order 为 REQ-NOT-002 生成工单"

        target_skill:
          description: "目标 Skill"
          type: string
          required: false
          example: "harness-order"

        target_artifact:
          description: "目标 Artifact"
          type: string
          required: false
          example: "F22-specs"

        estimated_effort:
          description: "预估工作量"
          type: string
          enum: [xs, s, m, l, xl]
          required: false
          example: "s"

  # === 验证上下文 ===
  context:
    description: "验证执行的上下文"
    type: object
    required: true
    properties:
      environment:
        description: "验证环境信息"
        type: object
        properties:
          runner:
            description: "执行器"
            type: string
            example: "harness-verify"

          version:
            description: "Verify Schema 版本"
            type: string
            example: "v0.1-draft"

          timestamp:
            description: "执行时间"
            type: string
            format: "date-time"
            example: "2026-06-24T18:00:00+08:00"

      inputs:
        description: "参与验证的 Artifact 列表"
        type: array
        items:
          type: object
          properties:
            artifact_id:
              type: string
              example: "F22-specs"

            artifact_type:
              type: string
              example: "spec"

            version:
              type: string
              example: "1.0.0"

      validation_status_map:
        description: |
          各 validation_step 的执行状态映射。
          ⚠️ 此字段由 Verify Report 自身维护，不是 Task Schema 字段。
          Task Schema v1.0-frozen 不包含 status 字段，
          避免破坏 Frozen Schema，由 Verify Schema 引入运行时状态。
        type: object
        required: true
        additionalProperties:
          type: string
          enum: [passed, failed, skipped, error]
        example:
          "VAL-F22-001-001": "passed"
          "VAL-F22-001-002": "failed"
          "VAL-F22-001-003": "skipped"
        notes: |
          key: task.validation_steps[].id（格式：VAL-{task_id}-{seq:03d}）
          value: 执行状态（passed/failed/skipped/error）

          由执行 Skill 填充：
          - harness-verify：自动化测试结果
          - harness-runtime-verify：运行时验证结果
          - harness-review-loop：代码审查结果

  # === 元评估 ===
  meta_evaluation:
    description: "对验证本身的元评估"
    type: object
    required: false
    properties:
      schema_compliance:
        description: "被验证的 Artifact 是否符合 Schema"
        type: boolean
        example: true

      reference_integrity:
        description: "引用完整性是否通过"
        type: boolean
        example: true

      verify_confidence:
        description: "验证结果可信度（0-1）"
        type: number
        minimum: 0
        maximum: 1
        example: 0.95
        notes: |
          基于：
          - Schema 合规性
          - 引用完整性
          - 检查项覆盖率
          - 历史一致率
```

