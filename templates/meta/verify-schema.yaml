## 冻结字段与枚举词汇表（v1.0 Frozen Contract）

> **生效日期**：2026-06-24
> **权威定义位置**：本章节为以下字段和枚举的**唯一权威定义**。
> **Consumer 一致性**：所有消费者 Skill（harness-verify / harness-runtime-verify / harness-review-loop / harness-analyze）必须使用本章节定义的字段名和枚举值。

### 4.1 冻结字段命名

下表为 v1.0 Frozen Contract 中**必须**使用的字段命名。修改字段名等同于 MAJOR 变更。

| # | 字段路径 | 字段名 | 类型 | 适用范围 | 引入版本 |
|---|---------|--------|------|---------|---------|
| 1 | `coverage.requirement_coverage` | 需求覆盖率 | object | harness-verify / harness-analyze | v0.1 |
| 2 | `coverage.acceptance_coverage` | 验收标准覆盖率 | object | harness-verify / harness-analyze | v0.1 |
| 3 | `coverage.constraint_coverage` | 约束引用覆盖率 | object | harness-verify / harness-review-loop / harness-analyze | v0.1 |
| 4 | `coverage.validation_coverage` | 验证步骤执行率 | object | harness-verify / harness-runtime-verify / harness-analyze | v0.1 |
| 5 | `context.validation_status_map` | validation_step 执行状态映射 | object | harness-verify / harness-runtime-verify / harness-review-loop | v0.2 |
| 6 | `verify_output_mode` | Verify 输出模式参数 | enum | harness-analyze | v1.0 |

### 4.2 统一冻结枚举值

#### 4.2.1 coverage 子字段枚举

每个 coverage 对象必须包含：

| 字段名 | 类型 | 说明 |
|--------|------|------|
| `total_*` | integer | 总数（如 `total_requirements`、`total_criteria`、`total_constraints`、`total_validations`） |
| `covered_*` / `referenced_*` / `passed_*` / `defined_*` | integer | 已覆盖/已引用/已通过/已定义数 |
| `coverage_rate` | number (0-1) | 覆盖率（小数） |
| `uncovered` / `unreferenced` | array of string | 未覆盖/未引用的 ID 列表 |

> **注意**：`validation_coverage` 使用 `defined_validations` 和 `status_distribution`（而非 `passed_validations`），因为该字段为预检版，区分"已定义"与"已执行"。

#### 4.2.2 `context.validation_status_map.value` 枚举

`context.validation_status_map` 中每个 value 必须是以下 4 值之一：

| 枚举值 | 含义 | 适用场景 |
|--------|------|---------|
| `passed` | 验证步骤执行通过 | 测试全部通过、命令退出码 0、lint 零警告 |
| `failed` | 验证步骤执行失败 | 测试失败、命令非零退出码、断言失败 |
| `skipped` | 验证步骤被跳过 | 前置条件未满足、依赖缺失、用户主动跳过 |
| `error` | 验证步骤执行异常 | 工具本身故障、超时、配置错误 |

**消费方**：

- `harness-runtime-verify`：执行 lint/test/build 命令后填充
- `harness-verify`：聚合多来源的 status_map
- `harness-review-loop`：审查类步骤（如代码风格）的 status

#### 4.2.3 `verify_output_mode` 枚举

`harness-analyze` 的输出模式参数（v1.0 冻结）：

| 枚举值 | 含义 | 输出 |
|--------|------|------|
| `dual` | 同时输出 YAML Schema + Markdown 报告 | 两者皆有（**默认**） |
| `schema-only` | 仅输出 YAML Schema | 不生成 Markdown |
| `markdown-only` | 仅输出 Markdown 报告 | 不生成 YAML Schema |

**使用方式**：

```yaml
# Skill 调用时通过参数传递
harness-analyze:
  verify_output_mode: dual  # 或 schema-only / markdown-only
```

### 4.3 分维度词汇表策略

> **冻结决策（2026-06-24）**：v1.0 采用"统一字段名 + 分维度词汇表"策略。**不强制统一枚举词汇表**，因为不同维度的语义不同。

#### 4.3.1 架构约束严重度（`Architecture Constraint`）

适用范围：`constraint_coverage.severity_distribution`

| 枚举值 | 含义 | 阻断性 |
|--------|------|--------|
| `must` | 必须满足的硬约束 | 违反 = 阻塞 |
| `should` | 推荐满足的软约束 | 违反 = 警告 |
| `may` | 可选约束 | 违反 = 信息 |

**使用方**：`harness-review-loop`、`harness-analyze`

#### 4.3.2 运行时验证状态（`Runtime Verify`）

适用范围：`context.validation_status_map.value`

见 4.2.2，4 值枚举（passed / failed / skipped / error）。

**使用方**：`harness-runtime-verify`、`harness-verify`

#### 4.3.3 问题严重度（`Issue Severity`）

适用范围：`checks[].severity`、`failures[].impact`

| 枚举值 | 含义 | 是否阻塞 |
|--------|------|---------|
| `block` | 阻塞性问题，必须修复才能通过 | ✅ 是 |
| `warning` | 警告问题，建议修复 | ❌ 否 |
| `info` | 信息性问题，仅提示 | ❌ 否 |

**使用方**：`harness-verify`

#### 4.3.4 为什么允许分维度词汇表

| 维度 | 词汇表 | 语义重点 |
|------|--------|---------|
| Architecture Constraint | `must / should / may` | 表达约束的强制级别 |
| Runtime Verify | `passed / failed / skipped / error` | 表达执行结果状态 |
| Issue Severity | `block / warning / info` | 表达问题对流程的影响 |

如果强制统一为一个词汇表（如只用 `must/should/may`），将损失语义表达能力：

- 运行时验证的 `passed` 无法用 `must` 表达（"必须"不是状态）
- 问题严重度的 `block` 无法用 `must` 表达（"必须"是要求，不是状态）

**冻结原则**：

- ✅ **统一字段名**（如 `severity` 字段名统一）
- ✅ **统一枚举定义位置**（本章节为权威）
- ✅ **允许不同维度使用不同词汇表**

### 4.4 Consumer 字段映射

下表列出各 Consumer Skill 使用了哪些冻结字段：

| Consumer Skill | 读取的字段 | 写入的字段 | 输出模式 |
|---------------|-----------|-----------|---------|
| **harness-verify** | coverage.* (四类) | context.validation_status_map、checks、failures、recommendations | yaml + md |
| **harness-runtime-verify** | context.validation_status_map、validation_coverage | context.validation_status_map | yaml + md |
| **harness-review-loop** | constraint_coverage.severity_distribution | constraint_coverage、issues | yaml + md |
| **harness-analyze** | coverage.* (四类预检版) | coverage、audit_report | 按 verify_output_mode |

### 4.5 Frozen Contract 修改策略

修改本章节定义的字段名或枚举值，按以下规则升级版本：

| 修改类型 | 示例 | 版本升级 |
|---------|------|---------|
| 增加新枚举值 | `severity` 新增 `critical` | MINOR（v1.1.0） |
| 修改枚举值含义 | `passed` 从"通过"改为"通过+警告" | MAJOR（v2.0.0） |
| 删除枚举值 | 移除 `skipped` | MAJOR（v2.0.0） |
| 修改字段名 | `requirement_coverage` → `req_coverage` | MAJOR（v2.0.0） |
| 增加新字段 | 新增 `coverage.coverage_trend` | MINOR（v1.1.0） |
| 修改字段类型 | `coverage_rate` 从 number 改为 string | MAJOR（v2.0.0） |

详细流程见 `templates/meta/schema-change-policy.md`。