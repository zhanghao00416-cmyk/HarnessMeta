name: feature
description: 复杂功能——需要技术设计文档

artifacts:
  - id: proposal
    template: changes/proposal.md
    requires: []
    instruction: |
      描述变更动机和范围。
      必须列出新增和变更的能力。
      标注破坏性变更。
      包含影响范围分析。

  - id: specs
    template: changes/delta-spec.md
    requires: [proposal]
    instruction: |
      用"新增/修改/移除"表达增量变更。
      每个需求至少一个场景。
      场景必须用"前置/当/则"格式。
      禁止在规格中写实现细节。
      修改需求必须包含完整更新后内容。

  - id: design
    template: changes/design.md
    requires: [proposal]
    optional: true
    instruction: |
      仅当以下任一条件成立时才创建：
      - 跨模块变更
      - 引入新外部依赖
      - 有安全或性能复杂度
      - 需要数据模型变更
      若条件不成立，跳过此 artifact。
      记录技术决策、备选方案和否决原因。
      列出将要新增或修改的文件路径。

  - id: tasks
    template: changes/tasks.md
    requires: [specs]
    requires_with_design: [specs, design]
    instruction: |
      根据规格和设计文档（如存在）分解任务。
      每个任务对应一个可验证的产出。
      按执行顺序排列。
      包含测试相关任务。

apply:
  requires: [tasks]
  instruction: |
    读取 proposal、specs、design 和 tasks。
    逐个实现任务，完成后标记 [x]。
    实现必须匹配增量规格中的场景。
    技术决策必须体现在代码中。
    遇到阻塞立即暂停并报告。
